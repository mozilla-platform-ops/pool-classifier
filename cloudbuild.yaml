# Build → push → deploy the pool classifier to Cloud Run.
#
# Manual build from the repository root (the build context). Pass the git short
# SHA as the image tag for traceability:
#   gcloud builds submit --config cloudbuild.yaml \
#       --substitutions=_TAG=$(git rev-parse --short HEAD) .
#
# _TAG defaults to "latest" if omitted. _REGION defaults to us-west1.
#
# (We use a user-defined $_TAG rather than the built-in $COMMIT_SHA because
# COMMIT_SHA is only populated for repo-triggered builds — a manual
# `gcloud builds submit` leaves it empty, producing an invalid image tag.)
#
# The Artifact Registry repo (pool-classifier) and the Cloud Run service
# (pool-classifier) are created by terraform; this only builds and rolls out
# new revisions.
steps:
  # Build the image (uses the project dir as context, Dockerfile at its root).
  - name: "gcr.io/cloud-builders/docker"
    id: build-image
    args:
      - build
      - --file=Dockerfile
      - --tag=$_REGION-docker.pkg.dev/$PROJECT_ID/pool-classifier/app:$_TAG
      - --tag=$_REGION-docker.pkg.dev/$PROJECT_ID/pool-classifier/app:latest
      - --cache-from=$_REGION-docker.pkg.dev/$PROJECT_ID/pool-classifier/app:latest
      - .

  - name: "gcr.io/cloud-builders/docker"
    id: push-image
    waitFor: ["build-image"]
    args:
      - push
      - --all-tags
      - $_REGION-docker.pkg.dev/$PROJECT_ID/pool-classifier/app

  # Roll out the new revision.
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    id: deploy
    waitFor: ["push-image"]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - pool-classifier
      - --image=$_REGION-docker.pkg.dev/$PROJECT_ID/pool-classifier/app:$_TAG
      - --region=$_REGION
      - --quiet

substitutions:
  _REGION: us-west1
  _TAG: latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

images:
  - $_REGION-docker.pkg.dev/$PROJECT_ID/pool-classifier/app:$_TAG
  - $_REGION-docker.pkg.dev/$PROJECT_ID/pool-classifier/app:latest
